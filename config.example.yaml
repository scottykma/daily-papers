llm:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.deepseek.com
  fast_model: deepseek-v4-flash
  pro_model: deepseek-v4-pro
  flash_temperature: 0.1
  pro_temperature: 0.0
  flash_batch_size: 20
  pro_batch_size: 30
arxiv:
  page_size: 100
  delay_seconds: 10.0
  num_retries: 2
  trust_env: false
external:
  semantic_scholar_timeout: 15
  user_agent: DailyPapers/1.0
notification:
  email:
    enabled: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    timeout: 15
daily:
  max_papers: 20
  min_relevance_score: 5
  lookback_days: 1
  keyword_prefilter_top: 60
  title_score_top: 25
keyword_prefilter:
  title_exact_weight: 3
  title_partial_weight: 2
  abstract_weight: 1
report:
  score_green: 8
  score_orange: 5
paths:
  seen_papers: seen_papers.json
  cache_dir: .cache
  readline_history: ~/.daily_papers_history
